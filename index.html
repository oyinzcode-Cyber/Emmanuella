<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Ubasinachi ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    overflow:hidden;
    height:100vh;
    background:linear-gradient(135deg,#ff0080,#7928ca,#00c6ff);
    background-size:400% 400%;
    animation:bgMove 10s ease infinite;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* CONTAINER */
.container{
    padding:20px;
    width:90%;
    max-width:700px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border-radius:25px;
    box-shadow:0 0 25px rgba(255,255,255,0.2);
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

/* PROFILE IMAGE */
.profile-img{
    width:130px;
    height:130px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid white;
    margin:0 auto 10px;
    display:block;
}

/* TEXT */
.typewriter{
    font-size:1.1rem;
    border-right:2px solid white;
    white-space:nowrap;
    overflow:hidden;
}

/* BUTTONS */
button{
    margin-top:10px;
    padding:12px 18px;
    border:none;
    border-radius:30px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

/* HEARTS */
.hearts{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
    pointer-events:none;
}

.heart{
    position:absolute;
    color:#ffccff;
    animation:fall linear infinite;
}

@keyframes fall{
    from{transform:translateY(-100px);}
    to{transform:translateY(110vh);}
}

/* 🎂 CAKE */
.cake-wrapper{
    margin-top:15px;
}

.cake{
    position:relative;
    width:150px;
    height:120px;
    margin:auto;
    transform:rotateX(20deg);
}

.layer{
    position:absolute;
    width:150px;
    height:50px;
    background:linear-gradient(145deg,#ff4da6,#ff99cc);
    border-radius:10px;
}

.layer.bottom{bottom:0;}
.layer.top{
    width:120px;
    left:15px;
    bottom:40px;
}

.icing{
    position:absolute;
    width:120px;
    height:18px;
    background:white;
    bottom:90px;
    left:15px;
    border-radius:20px;
}

.candle{
    position:absolute;
    width:8px;
    height:30px;
    background:white;
    bottom:110px;
    left:70px;
    border-radius:3px;
}

.flame{
    position:absolute;
    width:12px;
    height:12px;
    background:orange;
    border-radius:50%;
    bottom:138px;
    left:68px;
    animation:flicker 0.2s infinite;
    box-shadow:0 0 10px orange;
}

@keyframes flicker{
    0%{transform:scale(1);}
    50%{transform:scale(1.3);}
    100%{transform:scale(1);}
}

.flame.out{
    display:none;
}

/* POPUPS */
.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    background:white;
    color:#333;
    padding:20px;
    border-radius:20px;
    width:85%;
    max-width:400px;
    transition:0.3s;
    z-index:999;
}

.popup.show{
    transform:translate(-50%,-50%) scale(1);
}

#lovePopup{
    background:linear-gradient(135deg,#ff4da6,#ff99cc);
    color:white;
}

/* CONFETTI */
.confetti{
    position:absolute;
    width:10px;
    height:10px;
    top:-10px;
    animation:fallConfetti 3s linear forwards;
}

@keyframes fallConfetti{
    to{transform:translateY(110vh) rotate(720deg);}
}
</style>
</head>

<body>

<div class="hearts"></div>

<div class="container">

    <img src="Emma.jpeg" class="profile-img">

    <h1>Happy Birthday 🎉</h1>
    <h2>Ubasinachi Emmanuella ❤️</h2>

    <p class="typewriter" id="text"></p>

    <!-- 🎂 CAKE -->
    <div class="cake-wrapper">
        <div class="cake">
            <div class="layer bottom"></div>
            <div class="layer top"></div>
            <div class="icing"></div>
            <div class="candle"></div>
            <div class="flame" id="flame"></div>
        </div>
    </div>

    <button onclick="blowCandle()">🎂 Blow Candle</button>
    <button onclick="showPopup()">😂 Surprise</button>

</div>

<!-- FUNNY POPUP -->
<div class="popup" id="popup">
    <h2>😂 Birthday Message</h2>
    <p id="msg"></p>
    <button onclick="closePopup()">Close</button>
</div>

<!-- 💌 LOVE POPUP -->
<div class="popup" id="lovePopup">
    <h2>💌 Secret Message Unlocked</h2>
    <p id="loveText"></p>
    <button onclick="closeLove()">❤️ Aww</button>
</div>

<script>

/* TYPEWRITER */
const text = "Today the world celebrates your beauty, smile, and amazing heart ❤️🎉";
let i=0;

function type(){
    if(i<text.length){
        document.getElementById("text").innerHTML += text[i++];
        setTimeout(type,50);
    }
}
type();

/* HEARTS */
function heart(){
    const h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.animationDuration=(3+Math.random()*3)+"s";
    document.querySelector(".hearts").appendChild(h);
    setTimeout(()=>h.remove(),6000);
}
setInterval(heart,300);

/* POPUP */
const messages=[
"You're aging like fine wine 😂🍷",
"You are too sweet for this world ❤️",
"Even Google can’t find someone like you 😂",
"Calories don’t count today 🍰😂"
];

function showPopup(){
    document.getElementById("popup").classList.add("show");
    document.getElementById("msg").innerHTML =
    messages[Math.floor(Math.random()*messages.length)];
}

function closePopup(){
    document.getElementById("popup").classList.remove("show");
}

/* 💌 LOVE MESSAGES */
const loveMessages=[
"I secretly wish I was there with you today ❤️",
"You make my world brighter every time I see you ❤️",
"I may not say it often, but you matter a lot to me ❤️",
"If I had one wish, it would be you smiling forever ❤️"
];

function unlockLove(){
    document.getElementById("lovePopup").classList.add("show");
    document.getElementById("loveText").innerHTML =
    loveMessages[Math.floor(Math.random()*loveMessages.length)];
}

function closeLove(){
    document.getElementById("lovePopup").classList.remove("show");
}

/* 🎂 BLOW CANDLE */
function blowCandle(){
    document.getElementById("flame").classList.add("out");

    // CONFETTI
    for(let i=0;i<40;i++){
        const c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        c.style.background=`hsl(${Math.random()*360},100%,60%)`;
        c.style.animationDuration=(2+Math.random()*2)+"s";
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),4000);
    }

    // 💌 unlock love message
    setTimeout(unlockLove,1200);
}

</script>

</body>
</html>
